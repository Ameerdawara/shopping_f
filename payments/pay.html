<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>صفحة الدفع</title>
    <link rel="stylesheet" href="pay.css">
</head>
<body>

<div class="payment-container">
    <h1>اختر طريقة الدفع</h1>

    <div class="payment-options">
        <label class="option">
            <input type="radio" name="payment" value="cash">
            <span>الدفع كاش عند الاستلام</span>
        </label>

        <label class="option">
            <input type="radio" name="payment" value="shamcash">
            <span>الدفع عبر شام كاش</span>
        </label>

        <label class="option">
            <input type="radio" name="payment" value="usdt">
            <span>الدفع عبر USDT</span>
        </label>
    </div>

    <button id="submitOrder" class="hidden">إرسال الطلب</button>
</div>

<!-- Popup QR -->
<div id="qrModal" class="modal">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <h2>قم بمسح رمز QR لإتمام الدفع</h2>
        <img id="qrImage" src="" alt="QR Code">
        <br>
         <button id="donePayment">تم الدفع</button>
    </div>
</div>

<script src="pay.js"></script>
</body>
</html>
